[defaults]
inventory = unused_
roles_path = ./roles

# Use the default SSH key location (id_ed25519)
# private_key_file will use ~/.ssh/id_ed25519 by default when not specified
host_key_checking = False

# Enhanced SSH configuration for unstable connections
timeout = 120
command_timeout = 120
connect_timeout = 60
gathering = smart
fact_caching = memory

# Connection resilience settings
retry_files_enabled = True
retry_files_save_path = ./.retry

# Increased parallelism but with connection stability
forks = 8
poll_interval = 5

# Additional resilience settings
error_on_undefined_vars = False
ansible_managed = Ansible managed: {file} modified on %Y-%m-%d %H:%M:%S by {uid} on {host}
interpreter_python = auto_silent

# Enhanced callback plugins for debugging
stdout_callback = yaml
bin_ansible_callbacks = True

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Enhanced SSH arguments for poor connections - maximum resilience
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes -o Compression=yes -o ConnectionAttempts=5 -o ExitOnForwardFailure=yes -o ForwardAgent=no -o LogLevel=ERROR
pipelining = True
control_path_dir = /tmp/.ansible-cp
retries = 5
# Additional connection settings for poor networks
timeout = 120
host_key_checking = False