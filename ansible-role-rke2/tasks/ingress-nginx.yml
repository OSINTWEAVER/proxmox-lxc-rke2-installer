---
- name: Install NGINX Ingress Controller
  kubernetes.core.k8s:
    state: present
    definition: "{{ item }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  loop: "{{ lookup('file', '../../../manifests/ingress-nginx.yaml') | from_yaml_all | list }}"
  when: rke2_ingress_nginx_enabled | default(false)
  
- name: Verify NGINX Ingress Controller deployment
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: ingress-nginx-controller
    namespace: ingress-nginx
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  when: rke2_ingress_nginx_enabled | default(false)
  register: nginx_deployment_status

- name: Verify NGINX Ingress Service is ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Service
    name: ingress-nginx-controller
    namespace: ingress-nginx
  when: rke2_ingress_nginx_enabled | default(false)
  register: nginx_service_status

- name: Display NGINX Ingress Controller status
  ansible.builtin.debug:
    msg: 
      - "NGINX Ingress Controller deployment status: {{ nginx_deployment_status.resources[0].status.conditions | map(attribute='type') | list if nginx_deployment_status.resources else 'Not found' }}"
      - "NGINX Ingress Service type: {{ nginx_service_status.resources[0].spec.type if nginx_service_status.resources else 'Not found' }}"
      - "LoadBalancer status: {{ nginx_service_status.resources[0].status.loadBalancer if nginx_service_status.resources and nginx_service_status.resources[0].status.loadBalancer is defined else 'Pending' }}"
  when: rke2_ingress_nginx_enabled | default(false)
